<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameTube x Zundamon - Natural Sync Production</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #84cc16;
            --bg: #000;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            overflow: hidden;
            width: 1920px; 
            height: 1080px;
        }
        #stage {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        #subtitle-container {
            position: absolute;
            bottom: 120px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }
        .subtitle {
            font-size: 80px;
            font-weight: 950;
            color: white;
            background: rgba(0,0,0,0.75);
            padding: 15px 50px;
            border-radius: 25px;
            border: 5px solid var(--green);
            text-shadow: 3px 3px 0 #000;
            display: none;
            max-width: 90%;
            text-align: center;
            line-height: 1.2;
        }

        #start-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #start-btn {
            font-size: 100px;
            color: white;
            padding: 50px 100px;
            border: 10px solid var(--green);
            border-radius: 60px;
            background: rgba(132, 204, 22, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startProduction()">
        <div id="start-btn">🎥 完璧な動画を生成するのだ！</div>
        <p style="margin-top:30px; font-size:40px; color: #84cc16;">クリックして「ずんだもん実況」を完成させるのだ！</p>
    </div>

    <div id="stage">
        <video id="main-video" src="GameTube - AI Game Platform - Google Chrome 2026-03-15 03-25-01.mp4"></video>
        <div id="subtitle-container">
            <div id="sub" class="subtitle"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('main-video');
        const sub = document.getElementById('sub');

        // Logic: Audio-driven flow with video JUMPs
        const script = [
            { audio: 'gt1.wav', text: 'やっほー！ずんだもんなのだ！今日はこのAI Game Platformで遊んでみるのだ！', videoStart: 3 },
            { audio: 'gt2.wav', text: '見て！この爽快なアクション！スライムを操作して敵をなぎ倒すのが最高に楽しいのだ！', videoStart: 13 },
            { audio: 'gt3.wav', text: 'うわー、囲まれたのだ！でも大丈夫なのだ。ボクのテクニックで、ほら、華麗に切り抜けるのだ！', videoStart: 23 },
            { audio: 'gt4.wav', text: 'さて！存分に遊んだ後は、自分でもゲームを作ってみるのだ！', videoStart: 37 }, // Jump to Gemini
            { audio: 'gt5.wav', text: 'このプラットフォームは、AIにお願いするだけで誰でもゲームが作れちゃうのだ。プログラミングは一切不要なのだ！', videoStart: 75 }, // Jump to Paste
            { audio: 'gt6.wav', text: 'Geminiさんに、マリオみたいなゲームを作って、って言うだけで完成なのだ。すごい時代になったのだ！', videoStart: 151 } // Jump to Result
        ];

        let currentIdx = -1;
        const audios = script.map(item => new Audio('audio/' + item.audio));

        function startProduction() {
            document.getElementById('start-overlay').style.display = 'none';
            nextStep();
        }

        function nextStep() {
            currentIdx++;
            if (currentIdx >= script.length) {
                sub.style.display = 'none';
                return;
            }

            const item = script[currentIdx];
            const audio = audios[currentIdx];

            // Update UI
            sub.innerText = item.text;
            sub.style.display = 'block';

            // Sync Video
            video.currentTime = item.videoStart;
            video.play();

            // Sync Audio
            audio.play();
            audio.onended = () => {
                // When current segment ends, immediately go to next
                nextStep();
            };
        }
    </script>
</body>
</html>
